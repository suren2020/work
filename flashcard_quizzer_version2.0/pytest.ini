[tool:pytest]
# Pytest configuration for JSONLoader testing

# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output configuration
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    --color=yes

# Markers for test categorization
markers =
    unit: Unit tests
    integration: Integration tests
    performance: Performance tests
    happy_path: Happy path scenarios
    error_conditions: Error condition tests
    edge_cases: Edge case tests

# Minimum version
minversion = 6.0